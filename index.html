<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Карта танцювальних студій | танцювальний дайджест</title>

    <!-- Leaflet CSS -->
    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
    />

    <!-- Власні стилі -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Simple Analytics: базовий скрипт (авто-трекінг переглядів сторінок) -->
    <script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <!-- Фолбек-черга на випадок, якщо скрипт ще не завантажився на момент виклику події -->
    <script>
        window.sa_event = window.sa_event || function() {
            (window.sa_event.q = window.sa_event.q || []).push(arguments);
        };
        // Якщо хочеш власну подію відкриття сторінки, розкоментуй:
        // document.addEventListener('DOMContentLoaded', () => {
        //   sa_event('site_open', { page: location.pathname });
        // });
    </script>
</head>
<body>
<div id="map"></div>

<!-- Leaflet JS -->
<script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
></script>

<script>
    // Плитки MapTiler (можеш залишити як є)
    const MAPTILER_KEY = "tJoJlJ4VvyIVk26MvPbb";
    const TILE_URL = `https://api.maptiler.com/maps/streets-v2/256/{z}/{x}/{y}@2x.png?key=${MAPTILER_KEY}`;

    // Ініціалізація карти
    const map = L.map('map').setView([50.450001, 30.523333], 12);
    L.tileLayer(TILE_URL, {
        attribution: '&copy; OpenStreetMap contributors, &copy; <a href="https://www.maptiler.com/copyright/">MapTiler</a>',
        tileSize: 256,
        maxZoom: 19
    }).addTo(map);

    // Завантаження даних студій і додавання маркерів + тултіпів + попапів + трекінг кліку
    fetch('studios.json')
        .then((response) => {
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        })
        .then((studios) => {
            if (!Array.isArray(studios)) {
                console.warn('Очікувався масив студій, але отримано інший формат');
                return;
            }

            const bounds = [];
            for (const item of studios) {
                if (typeof item.lat !== 'number' || typeof item.lng !== 'number') continue;

                const marker = L.marker([item.lat, item.lng]).addTo(map);

                marker.bindTooltip(item["заголовок"], {
                    permanent: true,
                    direction: "top",
                    offset: [0, -18],
                    className: "my-tooltip"
                }).openTooltip();

                const html = `
        <div class="popup">
          <h3>${item["студія"]}</h3>
          <div><strong>${item["заголовок"]}</strong></div>
          <div class="muted">${item["адреса"]}</div>
          <div>Контакт: ${item["контакт"]}</div>
        </div>`;
                marker.bindPopup(html);

                // 🔹 ТРЕКІНГ: фіксуємо клік по маркеру в Simple Analytics
                marker.on('click', () => {
                    sa_event('marker_click', {
                        studio: item["студія"],
                        title: item["заголовок"],
                        address: item["адреса"]
                    });
                });

                bounds.push([item.lat, item.lng]);
            }

            if (bounds.length) map.fitBounds(bounds, { padding: [30, 30] });
        })
        .catch((error) => {
            console.error('Не вдалося завантажити дані студій:', error);
        });
</script>
</body>
</html>
