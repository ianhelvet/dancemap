<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Карта танцювальних студій — адаптивні тултіпи</title>

    <!-- Leaflet CSS -->
    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
    />

    <!-- Власні стилі -->
    <link rel="stylesheet" href="styles.css" />

</head>
<body>
<div id="map"></div>

<script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
></script>
<script>
    const STUDIOS = [
        {"студія":"Rock Dance Studio, Хрещатик","заголовок":"Бугі-вугі","адреса":"Київ, вул. Хрещатик 32А","контакт":"380962478620","lat":50.44705,"lng":30.52056},
        {"студія":"Rock Dance Studio, Оболонь","заголовок":"Бугі-вугі","адреса":"Київ, просп. В. Івасюка 10А","контакт":"380962478620","lat":50.49899,"lng":30.51704},
        {"студія":"Rock Dance Studio, Позняки","заголовок":"Бугі-вугі","адреса":"Київ, вул. М. Гришка 6А","контакт":"380962478620","lat":50.39572629,"lng":30.6308535},
        {"студія":"Bailando","заголовок":"Kizomba Lady","адреса":"Київ, вул. Тургенєвська 11","контакт":"insta: bailando_dance_studio","lat":50.44871,"lng":30.49446},
        {"студія":"iGYM","заголовок":"Latina Mix","адреса":"Київ, вул. Героїв Маріуполя 8","контакт":"380443442703","lat":50.3825812368,"lng":30.4543937081},
        {"студія":"Ravado Studio","заголовок":"Kizomba","адреса":"Київ, вул. Є.Коновальца 36Д","контакт":"380673454876","lat":50.425609,"lng":30.533502},
        {"студія":"Lago Family","заголовок":"Salsa","адреса":"Київ, вул. Терещенківська 13","контакт":"@lago_andrii (тг)","lat":50.441389,"lng":30.514722},
        {"студія":"Депо","заголовок":"Касино","адреса":"Київ, вул.Васильківська, 23А","контакт":"676834608","lat":50.439041767,"lng":30.5176469},
        {"студія":"СпортЛенд","заголовок":"Bachata footwork","адреса":"Київ, вул. Микільсько-Слобідська 1А","контакт":"@Eiren_U (тг)","lat":50.454631647,"lng":30.593182254},
        {"студія":"Ola Dance Studio","заголовок":"Footwork","адреса":"Київ, вул. Ділова 22Б","контакт":"380951488855","lat":50.430467201,"lng":30.51489153},
        {"студія":"CubanoBoom","заголовок":"Salsa Casino","адреса":"Київ, вул. Шимановського 2/1, оф. 334","контакт":"672899010","lat":50.455278,"lng":30.605}
    ];

    const MAPTILER_KEY = "tJoJlJ4VvyIVk26MvPbb";
    const TILE_URL = `https://api.maptiler.com/maps/streets-v2/256/{z}/{x}/{y}@2x.png?key=${MAPTILER_KEY}`;

    const map = L.map('map').setView([50.450001, 30.523333], 12);
    L.tileLayer(TILE_URL, {
        attribution: '&copy; OpenStreetMap contributors, &copy; <a href="https://www.maptiler.com/copyright/">MapTiler</a>',
        tileSize: 256,
        maxZoom: 19
    }).addTo(map);

    const bounds = [];
    for (const item of STUDIOS) {
        if (typeof item.lat !== 'number' || typeof item.lng !== 'number') continue;

        const marker = L.marker([item.lat, item.lng]).addTo(map);

        marker.bindTooltip(item["заголовок"], {
            permanent: true,
            direction: "top",
            offset: [0, -18],
            className: "my-tooltip"
        }).openTooltip();

        const html = `
        <div class="popup">
          <h3>${item["студія"]}</h3>
          <div><strong>${item["заголовок"]}</strong></div>
          <div class="muted">${item["адреса"]}</div>
          <div>Контакт: ${item["контакт"]}</div>
        </div>`;
        marker.bindPopup(html);

        bounds.push([item.lat, item.lng]);
    }
    if (bounds.length) map.fitBounds(bounds, { padding: [30, 30] });
</script>
</body>
</html>
